<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1E2761, #7A2048);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {   
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2 class="text-center mb-4">Login</h2>
    
    <form action="#" method="POST">
        

        <div class="form-floating mb-3">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>
        
        <div class="form-floating mb-3">
            <input type="password" class="form-control text-dark" id="passwordInput" placeholder="Password"required>
            <label for="passwordInput" class="text-dark">Password</label>
        </div>
            <a href="signupcopy.html" target="_blank">Don't have an account? Register here.</a>
        
        <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Sign In</button>
    </form>
    <div class="text-center">
    <a href="index.html" target="_blank" class="btn btn-dark btn-lg w-100 mt-2">
    <i class="bi bi-house-fill"></i>Back to Home
</a>
</div>
</div>


</body>
</html>
