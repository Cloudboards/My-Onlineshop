<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #1E2761, #7A2048);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>


<div class="register-card">
    <h2 class="text-center mb-4">Sign Up</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
        <div class="row mb-3">
            <div class="col-md-12">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Daulat, Enrico Jhayk O." required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Gmail</label>
            <div class="input-group">
                <input type="text" class="form-control" placeholder="username@gmail.com" required>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-12">
                <label class="form-label d-block">Gender</label>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" checked>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>


        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Retype password" required>
            </div>
        </div>


        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                I agree to the terms and conditions.
            </label><br>
             <a href="logincopy.html" target="_blank">Already have an account? Login here.</a>
        </div>
       
        <button type="submit" class="btn btn-success w-100 py-2">Submit Registration</button>
    </form>
</div>  
</body>
</html>
